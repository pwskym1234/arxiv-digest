name: Daily arxiv Digest

on:
  schedule:
    # 매일 UTC 01:00 (한국시간 10:00)에 실행
    - cron: '0 1 * * *'
  workflow_dispatch:  # 수동 실행 버튼도 가능

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arxiv digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/main.py

      - name: Commit and push new post
        run: |
          git config user.name "arxiv-digest-bot"
          git config user.email "bot@arxiv-digest"
          git add _posts/
          # 변경사항이 있을 때만 커밋
          git diff --staged --quiet || git commit -m "📚 $(date +%Y-%m-%d) 논문 다이제스트 추가"
          git push
