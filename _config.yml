title: "arxiv Digest"
description: "AI가 매일 선별하고 요약하는 최신 논문 다이제스트"
url: ""  # GitHub Pages가 자동 설정
baseurl: "/arxiv-digest"  # 레포지토리 이름과 동일하게

# 테마
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

# 빌드 설정
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 포스트 설정
permalink: /:year/:month/:day/:title/
paginate: 10

# 기본값
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

# 제외 파일
exclude:
  - scripts/
  - requirements.txt
  - README.md
  - .github/
